<!DOCTYPE html>
<html>
<head>
    <title>Reader</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <style>
        body {
            font-family: Arial, sans-serif;
            color: #333;
            margin: 0;
            padding: 0;
            background-color: #fff;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        #editor {
            height: 100px; /* Smaller input area */
            background-color: #f5f5f5; 
            border: none; /* Remove border */
            border-radius: 20px; /* Rounded edges */
            margin-top: 10px; /* Add space above the input area */
        }

        .ql-toolbar {
            border-radius: 20px; /* Rounded edges for the toolbar */
        }

        .ql-snow .ql-picker-label,
        .ql-snow .ql-picker-options {
            border-radius: 20px; /* Rounded edges for the dropdown */
        }

.submit-button {
    border: none;
    border-radius: 20px;
    padding: 10px 20px;
    font-size: 20px;
    background-color: #126483; 
    color: #FFFFFF; 
    cursor: pointer;
    box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
    margin-top: 10px;
}


.submit-button:hover {
    background-color: #0c4256; 
}


        #output {
            white-space: pre-wrap; /* Keeps the line breaks in user input */
            line-height: 1.6;
            font-size: 1.2em; /* Increase the size of the text */
            color: #000000; 
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="editor"></div>
        <button class="submit-button" onclick="displayText()">Submit</button>
        <div id="output"></div>
    </div>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script>
        var quill = new Quill('#editor', {
            theme: 'snow'
        });

        function displayText() {
            var text = quill.root.innerHTML;
            document.getElementById('output').innerHTML = text;
        }
    </script>
</body>
</html>
